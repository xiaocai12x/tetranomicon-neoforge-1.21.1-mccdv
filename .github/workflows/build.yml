name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Mutil
        uses: actions/checkout@v4
        with:
          repository: evelant/mutil
          ref: 1.21.1
          path: tetra-port/mutil

      - name: Checkout Tetra
        uses: actions/checkout@v4
        with:
          repository: evelant/tetra
          ref: 1.21
          path: tetra-port/tetra

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle wrappers executable
        run: |
          chmod +x ./gradlew
          chmod +x tetra-port/mutil/gradlew
          chmod +x tetra-port/tetra/gradlew

      - name: Build Tetra dependencies
        env:
          local_maven: ${{ github.workspace }}/.m2/repository
        run: |
          cd tetra-port/mutil
          ./gradlew --no-daemon publishToMavenLocal
          cd ../tetra
          ./gradlew --no-daemon build

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Upload jars
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tetranomicon-neoforge-1.21.1
          path: build/libs/*.jar
