name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Upload jars
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tetranomicon-neoforge-1.21.1
          path: build/libs/*.jar
